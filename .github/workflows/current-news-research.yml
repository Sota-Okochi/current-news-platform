name: Current News Research

on:
  workflow_dispatch:
  schedule:
    # JST 09:00 = UTC 00:00
    - cron: "0 0 * * *"
    # JST 19:00 = UTC 10:00
    - cron: "0 10 * * *"

permissions:
  contents: read

concurrency:
  group: current-news-research
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run current news research
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          ARTICLES_PER_RUN: "3"
          LOOKBACK_LIMIT: "12"
          TZ: "Asia/Tokyo"
        run: python scripts/current_news_research.py
